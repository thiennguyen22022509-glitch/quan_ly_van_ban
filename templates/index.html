<!DOCTYPE html>
<html>
<head>
    <title>Quản Lý Văn Bản Cloud</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h2 class="text-primary">📂 Danh Sách Văn Bản (Google Drive + MongoDB)</h2>
    <table class="table table-bordered mt-3">
        <thead class="table-dark">
            <tr>
                <th>Tên File</th>
                <th>Link</th>
            </tr>
        </thead>
        <tbody>
            {% for file in files %}
            <tr>
                <td>{{ file['name'] }}</td>
                <td><a href="{{ file['webViewLink'] }}" target="_blank">Xem ngay</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
